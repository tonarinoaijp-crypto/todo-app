<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoアプリ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #4a90d9;
      color: #fff;
      padding: 16px 20px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: bold;
    }

    main {
      max-width: 600px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    section {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    section h2 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 14px;
    }

    form {
      display: flex;
      gap: 8px;
    }

    form input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }

    form input[type="text"]:focus {
      border-color: #4a90d9;
    }

    form button {
      padding: 10px 18px;
      font-size: 1rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    form button:hover {
      background: #357abd;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    ul li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #f9f9f9;
      border-radius: 6px;
      border: 1px solid #eee;
      font-size: 1rem;
    }

    .task-text {
      flex: 1;
      cursor: pointer;
      user-select: none;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .delete-btn:hover {
      color: #e05555;
    }

    .empty-message {
      color: #aaa;
      font-size: 0.95rem;
      text-align: center;
      padding: 12px 0;
    }

    footer {
      text-align: center;
      padding: 24px 16px;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Todoアプリ</h1>
  </header>

  <main>
    <section>
      <h2>新しいタスクを追加</h2>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="タスクを入力">
        <button type="submit">追加</button>
      </form>
    </section>

    <section>
      <h2>タスク一覧</h2>
      <ul id="todo-list"></ul>
    </section>
  </main>

  <footer>
    <p>Todoアプリ</p>
  </footer>

  <script>
    const form = document.getElementById('todo-form');
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    function loadTasks() {
      return JSON.parse(localStorage.getItem('tasks') || '[]');
    }

    function saveTasks() {
      const tasks = Array.from(list.querySelectorAll('li')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        done: li.querySelector('.task-text').classList.contains('done'),
      }));
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderEmpty() {
      list.innerHTML = '<p class="empty-message">タスクがありません</p>';
    }

    function addTask(text, done = false) {
      if (list.querySelector('.empty-message')) {
        list.innerHTML = '';
      }

      const li = document.createElement('li');

      const span = document.createElement('span');
      span.className = 'task-text' + (done ? ' done' : '');
      span.textContent = text;
      span.addEventListener('click', () => {
        span.classList.toggle('done');
        saveTasks();
      });

      const btn = document.createElement('button');
      btn.className = 'delete-btn';
      btn.textContent = '✕';
      btn.setAttribute('aria-label', 'タスクを削除');
      btn.addEventListener('click', () => {
        li.remove();
        if (list.children.length === 0) renderEmpty();
        saveTasks();
      });

      li.appendChild(span);
      li.appendChild(btn);
      list.appendChild(li);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addTask(text);
      saveTasks();
      input.value = '';
      input.focus();
    });

    // 起動時にlocalStorageから復元
    const saved = loadTasks();
    if (saved.length > 0) {
      saved.forEach(task => addTask(task.text, task.done));
    } else {
      renderEmpty();
    }
  </script>

</body>
</html>
